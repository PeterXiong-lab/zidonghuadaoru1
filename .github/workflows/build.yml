name: Build EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl pyinstaller

      - name: Build EXE
        run: |
          pyinstaller ^
            --onefile ^
            --console ^
            --name 地址处理工具 ^
            your_script.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: 地址处理工具
          path: dist/*.exe
