name: Build Windows EXE

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # 开启手动触发按钮，方便随时打包

jobs:
  build:
    runs-on: windows-latest # 使用 Windows 环境，确保打包出 .exe

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # 推荐使用 3.10，兼容性较好

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 直接安装你的脚本依赖以及打包工具 pyinstaller
        pip install pandas openpyxl pyinstaller
        
        # 💡 如果你后续创建了 requirements.txt，可以改为使用下面这行：
        # pip install -r requirements.txt

    - name: Build with PyInstaller
      run: |
        # --noconfirm: 覆盖之前的文件
        # --onefile: 打包成单个 exe 文件
        # --console: 保留控制台黑框 (因为你的代码里有 print 和 input，需要控制台交互)
        pyinstaller --noconfirm --onefile --console main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Excel-Processor-EXE # 下载时的压缩包名称
        path: dist/main.exe       # 将打包好的 exe 上传为产物
